name: Build HomeCore

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]
        board: [lm3s6965evb]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            python3 \
            python3-venv \
            python3-pip

      - name: Setup Python venv
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Configure
        run: |
          . .venv/bin/activate
          cmake -S . -B build-${{ matrix.build_type }}-${{ matrix.board }} \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DHOMECORE_BOARD=${{ matrix.board }} \
            -DPython3_EXECUTABLE=${{ github.workspace }}/.venv/bin/python \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchains/arm-none-eabi.cmake \

      - name: Build
        run: |
          cmake --build build-${{ matrix.build_type }}-${{ matrix.board }} --verbose

      - name: Firmware size
        run: |
          find build-${{ matrix.build_type }}-${{ matrix.board }} -type f \( -name "*.elf" -o -name "homecore" \) -exec arm-none-eabi-size {} \;

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: homecore-${{ matrix.build_type }}-${{ matrix.board }}
          path: |
            build-${{ matrix.build_type }}-${{ matrix.board }}/*.elf
            build-${{ matrix.build_type }}-${{ matrix.board }}/*.bin
            build-${{ matrix.build_type }}-${{ matrix.board }}/*.hex
            build-${{ matrix.build_type }}-${{ matrix.board }}/*.map